name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Testes (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Analisar código (go vet)
        run: go vet ./...

      - name: Executar testes
        run: go test ./...

  build:
    name: Build e checksums
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compilar binários com versão injetada
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-X main.version=${VERSION}"
          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/assinatura-${VERSION}-linux-amd64   ./cmd/assinatura
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/assinatura-${VERSION}-windows-amd64.exe ./cmd/assinatura
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/assinatura-${VERSION}-darwin-amd64  ./cmd/assinatura

          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/simulador-${VERSION}-linux-amd64   ./cmd/simulador
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/simulador-${VERSION}-windows-amd64.exe ./cmd/simulador
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/simulador-${VERSION}-darwin-amd64  ./cmd/simulador

      - name: Gerar checksums SHA256
        run: cd dist && sha256sum * > checksums.txt

      - name: Publicar artefatos
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/

  sign:
    name: Assinar artefatos (Cosign)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - uses: sigstore/cosign-installer@v3

      - name: Assinar binários com Cosign (keyless OIDC)
        run: |
          for f in dist/*; do
            [ "$f" = "dist/checksums.txt" ] && continue
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done

      - name: Publicar artefatos assinados
        uses: actions/upload-artifact@v4
        with:
          name: release-signed
          path: dist/

  publish:
    name: Publicar Release
    runs-on: ubuntu-latest
    needs: sign

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-signed
          path: dist/

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
